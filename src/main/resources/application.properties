# Application Configuration
spring.application.name=learnnow-dream-pipeline

# Server Configuration
server.port=8080

# Database Configuration (MySQL for production)
spring.datasource.url=jdbc:mysql://localhost:3306/learnnow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging Configuration
logging.level.com.learnnow.dreampipeline=INFO
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# API Keys (TODO: Replace with actual keys)
# Groq API Configuration
groq.api.key=YOUR_GROQ_API_KEY_HERE
groq.api.base-url=https://api.groq.com/openai/v1

# YouTube API Configuration  
youtube.api.key=YOUR_YOUTUBE_API_KEY_HERE
youtube.api.base-url=https://www.googleapis.com/youtube/v3

# Application Settings
app.quiz.default-questions-per-topic=7
app.quiz.difficulty-factor-base=1.0
app.video.caption-required=true